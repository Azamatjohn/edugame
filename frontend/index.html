<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduGame Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="auth-screen" class="auth-overlay">
  <div class="auth-bg">
    <div class="auth-star s1">⭐</div>
    <div class="auth-star s2">🌟</div>
    <div class="auth-star s3">✨</div>
    <div class="auth-star s4">⭐</div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎮</div>
      <h1 class="auth-brand">EduGame Pro</h1>
      <p class="auth-tagline">Informatika fanini o'rganishning qiziqarli usuli</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Kirish</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Ro'yxatdan o'tish</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="auth-form">
      <div class="form-group">
        <label>Login</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="login-username" placeholder="Loginingizni kiriting"/>
        </div>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="login-password" placeholder="Parolingizni kiriting"/>
        </div>
      </div>
      <button class="auth-btn" onclick="doLogin()">
        <span>Kirish</span> <i class="fas fa-arrow-right"></i>
      </button>
      <p class="auth-switch">Hisobingiz yo'qmi? <a onclick="switchAuthTab('register')">Ro'yxatdan o'ting</a></p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" class="auth-form" style="display:none;">
      <div class="role-selector">
        <button class="role-btn active" data-role="student" onclick="selectRole(this)">
          <span class="role-icon">🎓</span>
          <span>O'quvchi</span>
        </button>
        <button class="role-btn" data-role="teacher" onclick="selectRole(this)">
          <span class="role-icon">👨‍🏫</span>
          <span>O'qituvchi</span>
        </button>
        <button class="role-btn" data-role="director" onclick="selectRole(this)">
          <span class="role-icon">🏫</span>
          <span>Direktor</span>
        </button>
      </div>

      <div class="form-group">
        <label>To'liq ism</label>
        <div class="input-wrap">
          <i class="fas fa-id-card"></i>
          <input type="text" id="reg-fullname" placeholder="Ism Familiya"/>
        </div>
      </div>
      <div class="form-group" id="class-group">
        <label>Sinf/Bosqich</label>
        <div class="input-wrap">
          <i class="fas fa-school"></i>
          <input type="text" id="reg-class" placeholder="Masalan: 6-B yoki 3-bosqich"/>
        </div>
      </div>
      <div class="form-group">
        <label>Login <small>(kamida 3 belgi)</small></label>
        <div class="input-wrap">
          <i class="fas fa-at"></i>
          <input type="text" id="reg-login" placeholder="o'zingizga login yarating"/>
        </div>
      </div>
      <div class="form-group">
        <label>Parol <small>(kamida 4 belgi)</small></label>
        <div class="input-wrap">
          <i class="fas fa-key"></i>
          <input type="password" id="reg-password" placeholder="Parol yarating"/>
        </div>
      </div>
      <div class="form-group">
        <label>Parolni tasdiqlang</label>
        <div class="input-wrap">
          <i class="fas fa-shield-alt"></i>
          <input type="password" id="reg-confirm" placeholder="Parolni qayta kiriting"/>
        </div>
      </div>
      <button class="auth-btn" onclick="doRegister()">
        <span>Ro'yxatdan o'tish</span> <i class="fas fa-rocket"></i>
      </button>
      <p class="auth-switch">Hisobingiz bormi? <a onclick="switchAuthTab('login')">Kirish</a></p>
    </div>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">🎮 EduGame</div>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">🎓</div>
        <div>
          <div class="user-name" id="sidebar-name">-</div>
          <div class="user-role" id="sidebar-role">-</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <button class="sidebar-logout" onclick="doLogout()">
      <i class="fas fa-sign-out-alt"></i> Chiqish
    </button>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <p class="page-sub" id="page-sub"></p>
      </div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div id="content"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="api.js"></script>
<script src="script.js"></script>
</body>
</html>
